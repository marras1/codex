services:
  codex:
    container_name: familyledger-codex
    build:
      context: .
      dockerfile: src/Codex/Dockerfile
    working_dir: /workspace/FamilyLedger
    ports:
      - "1455:1455"
    volumes:
      - ./:/workspace/FamilyLedger
      - codex_npm_cache:/root/.npm
      - codex_config:/root/.config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OPENAI_API_KEY: ""
      GITHUB_TOKEN: ""
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  codex_npm_cache:
  codex_config:
