services:
  api:
    build:
      context: .
      dockerfile: src/FamilyLedger.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=familyledger;Username=fl;Password=fl_dev
      - Jwt__Key=your-local-dev-secret-key-min-32-chars
      - Jwt__Issuer=familyledger-api
      - Jwt__Audience=familyledger-clients
      - AllowedOrigins__0=http://localhost:3000
      - AllowedOrigins__1=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/FamilyLedger.Web/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: familyledger
      POSTGRES_USER: fl
      POSTGRES_PASSWORD: fl_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fl -d familyledger"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
